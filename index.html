<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>The Shib Bull Live Banner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bebas+Neue&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
  <style>

:root {
  --bg: #050404;
  --ink: #ffffff;
  --muted: #b8aaa1;
  --orange: #ff7a18;
  --orange-2: #ffb238;
  --ember: #ff4d00;
  --panel: rgba(17, 15, 13, 0.9);
}

* { box-sizing: border-box; }
html, body { margin: 0; min-height: 100%; background: #111; }
body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  padding: 28px 12px;
  font-family: Manrope, system-ui, sans-serif;
}

.banner {
  width: 800px;
  height: 800px;
  position: relative;
  overflow: hidden;
  color: var(--ink);
  isolation: isolate;
  background:
    radial-gradient(circle at 76% 18%, rgba(255, 122, 24, 0.34), transparent 27%),
    radial-gradient(circle at 15% 86%, rgba(255, 77, 0, 0.24), transparent 30%),
    linear-gradient(135deg, #060505 0%, #0e0b08 48%, #030303 100%);
}
.banner::before {
  content: "";
  position: absolute;
  inset: -140px;
  z-index: -2;
  opacity: 0.95;
  transform: rotate(-6deg);
  background:
    repeating-linear-gradient(115deg, rgba(255,122,24,.09) 0 2px, transparent 2px 36px),
    repeating-linear-gradient(25deg, rgba(255,255,255,.035) 0 1px, transparent 1px 28px);
}
.banner::after {
  content: "";
  position: absolute;
  inset: 0;
  z-index: 10;
  pointer-events: none;
  opacity: .26;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,.12), transparent 1px),
    radial-gradient(circle at 80% 70%, rgba(255,122,24,.22), transparent 1px);
  background-size: 7px 7px, 11px 11px;
  mix-blend-mode: overlay;
}

.ring {
  position: absolute;
  border: 2px solid rgba(255,122,24,.24);
  border-radius: 50%;
  box-shadow: inset 0 0 55px rgba(255,122,24,.22), 0 0 45px rgba(255,122,24,.13);
}
.r1 { width: 540px; height: 540px; right: -165px; top: -120px; }
.r2 { width: 430px; height: 430px; left: -170px; bottom: -150px; border-color: rgba(255,178,56,.2); }
.header { position: absolute; left: 54px; top: 42px; display: flex; align-items: center; }
.badge {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 16px;
  border: 1px solid rgba(255,122,24,.55);
  border-radius: 999px;
  background: rgba(255,122,24,.12);
  box-shadow: 0 0 28px rgba(255,122,24,.16);
  font-size: 15px;
  font-weight: 900;
  letter-spacing: .12em;
}
.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--orange);
  box-shadow: 0 0 16px var(--orange);
  animation: pulse 1.8s ease infinite;
}
@keyframes pulse { 50% { transform: scale(1.45); opacity: .55; } }

.title {
  position: absolute;
  left: 52px;
  top: 112px;
  width: 520px;
  margin: 0;
  font-family: "Archivo Black", Impact, sans-serif;
  font-size: 86px;
  line-height: .84;
  letter-spacing: -.055em;
  text-transform: uppercase;
  text-shadow: 0 10px 0 #000, 0 0 38px rgba(255,122,24,.16);
}
.title span { display: block; color: var(--orange-2); }
.sub {
  position: absolute;
  left: 57px;
  top: 306px;
  width: 430px;
  margin: 0;
  color: #f3e4d7;
  font-size: 18px;
  line-height: 1.28;
  font-weight: 800;
}
.logos { position: absolute; right: 54px; top: 150px; width: 210px; height: 210px; }
.coin {
  position: absolute;
  overflow: hidden;
  border-radius: 50%;
  border: 5px solid rgba(255,178,56,.7);
  background: #111;
  box-shadow: 0 26px 56px rgba(0,0,0,.65), 0 0 34px rgba(255,122,24,.32);
}
.coin img { display: block; width: 100%; height: 100%; object-fit: cover; }
.coin.shib { width: 132px; height: 132px; right: 42px; top: 0; z-index: 2; }
.coin.ryoshi { width: 98px; height: 98px; left: 6px; bottom: 12px; border-color: rgba(255,122,24,.65); }

.stats { position: absolute; left: 52px; right: 52px; top: 386px; display: grid; gap: 16px; }
.stat {
  position: relative;
  min-height: 126px;
  overflow: hidden;
  padding: 21px 26px;
  border: 1px solid rgba(255,122,24,.36);
  border-radius: 30px;
  background: linear-gradient(135deg, var(--panel), rgba(6,5,4,.84));
  box-shadow: 0 24px 60px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.08);
}
.stat::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: linear-gradient(90deg, rgba(255,122,24,.18), transparent 38%);
}
.label { position: relative; color: var(--orange-2); font-size: 18px; font-weight: 900; letter-spacing: .15em; }
.value {
  position: relative;
  margin-top: 3px;
  font-family: "Bebas Neue", Impact, sans-serif;
  font-size: 68px;
  line-height: .9;
  letter-spacing: .02em;
  font-variant-numeric: tabular-nums;
}
.caption { position: relative; margin-top: 7px; color: var(--muted); font-size: 14px; font-weight: 800; }
.pill {
  position: absolute;
  right: 24px;
  top: 28px;
  padding: 12px 16px;
  border-radius: 999px;
  color: #140700;
  background: linear-gradient(135deg, var(--orange-2), var(--orange));
  box-shadow: 0 12px 30px rgba(255,122,24,.32);
  font-size: 14px;
  font-weight: 1000;
  letter-spacing: .08em;
}
.mark { position: absolute; color: rgba(255,122,24,.24); font-size: 34px; filter: drop-shadow(0 0 18px rgba(255,122,24,.2)); }
.m1 { left: 680px; top: 430px; transform: rotate(18deg); }
.m2 { left: 33px; top: 685px; transform: rotate(-22deg); }
.m3 { left: 675px; top: 690px; transform: rotate(22deg); }

.downloadbar {
  width: 800px;
  max-width: calc(100vw - 24px);
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
  gap: 14px;
  color: #d9c8b9;
  text-align: center;
}
.downloadbar button {
  cursor: pointer;
  border: 0;
  border-radius: 999px;
  padding: 14px 22px;
  color: #150700;
  background: linear-gradient(135deg, var(--orange-2), var(--orange));
  box-shadow: 0 16px 36px rgba(255,122,24,.28);
  font-size: 16px;
  font-weight: 1000;
  letter-spacing: .04em;
}
.downloadbar button:active { transform: translateY(1px); }
.downloadbar button:disabled { cursor: wait; opacity: .72; }
.downloadbar span { max-width: 520px; font-size: 13px; font-weight: 800; line-height: 1.35; opacity: .82; }

@media (max-width: 640px) {
  body { justify-content: flex-start; gap: 12px; padding: 12px 10px 18px; }
  .banner { width: min(100%, 430px); height: auto; aspect-ratio: 9 / 16; }
  .banner::before { inset: -18%; }
  .r1 { width: 76%; height: auto; aspect-ratio: 1; right: -34%; top: -8%; }
  .r2 { width: 72%; height: auto; aspect-ratio: 1; left: -36%; bottom: -10%; }
  .header { left: 7%; top: 4%; }
  .badge { gap: 7px; padding: 8px 11px; font-size: clamp(10px, 2.7vw, 13px); letter-spacing: .1em; }
  .dot { width: 8px; height: 8px; }
  .title { left: 7%; top: 11%; width: 82%; font-size: clamp(54px, 15vw, 84px); text-shadow: 0 7px 0 #000, 0 0 28px rgba(255,122,24,.16); }
  .sub { left: 7.5%; top: 25%; width: 74%; font-size: clamp(13px, 3.7vw, 19px); line-height: 1.34; }
  .logos { right: 7%; top: 32%; width: 42%; height: 18%; }
  .coin { border-width: 3px; }
  .coin.shib { width: 57%; height: auto; aspect-ratio: 1; right: 0; top: 0; }
  .coin.ryoshi { width: 44%; height: auto; aspect-ratio: 1; left: 0; bottom: 9%; }
  .stats { left: 7%; right: 7%; top: 51%; gap: 14px; }
  .stat { min-height: clamp(118px, 29vw, 152px); padding: 18px; border-radius: 22px; }
  .label { font-size: clamp(12px, 3.15vw, 16px); letter-spacing: .13em; }
  .value { margin-top: 5px; font-size: clamp(45px, 12.4vw, 66px); line-height: .92; }
  .caption { margin-top: 8px; padding-right: 92px; font-size: clamp(10px, 2.85vw, 13px); line-height: 1.3; }
  .pill { right: 16px; top: 20px; padding: 9px 12px; font-size: clamp(10px, 2.75vw, 13px); }
  .mark { font-size: 26px; }
  .m1 { left: 78%; top: 45%; }
  .m2 { left: 8%; top: 90%; }
  .m3 { left: 79%; top: 91%; }
  .downloadbar { width: min(100%, 430px); flex-direction: column; gap: 8px; }
  .downloadbar button { width: 100%; padding: 13px 18px; font-size: 14px; }
}

.banner.portrait-export { width: 1080px !important; height: 1920px !important; aspect-ratio: auto !important; }
.banner.portrait-export::before { inset: -190px; }
.banner.portrait-export .r1 { width: 820px; height: 820px; right: -365px; top: -160px; }
.banner.portrait-export .r2 { width: 780px; height: 780px; left: -390px; bottom: -190px; }
.banner.portrait-export .header { left: 78px; top: 76px; }
.banner.portrait-export .badge { gap: 16px; padding: 18px 24px; font-size: 24px; letter-spacing: .12em; }
.banner.portrait-export .dot { width: 16px; height: 16px; }
.banner.portrait-export .title { left: 76px; top: 210px; width: 860px; font-size: 148px; line-height: .84; text-shadow: 0 14px 0 #000, 0 0 52px rgba(255,122,24,.16); }
.banner.portrait-export .sub { left: 82px; top: 520px; width: 780px; font-size: 34px; line-height: 1.34; }
.banner.portrait-export .logos { right: 86px; top: 665px; width: 455px; height: 370px; }
.banner.portrait-export .coin { border-width: 8px; }
.banner.portrait-export .coin.shib { width: 255px; height: 255px; right: 0; top: 0; }
.banner.portrait-export .coin.ryoshi { width: 200px; height: 200px; left: 0; bottom: 36px; }
.banner.portrait-export .stats { left: 78px; right: 78px; top: 1010px; gap: 34px; }
.banner.portrait-export .stat { min-height: 275px; padding: 42px 48px; border-radius: 44px; }
.banner.portrait-export .label { font-size: 34px; letter-spacing: .14em; }
.banner.portrait-export .value { margin-top: 10px; font-size: 126px; line-height: .9; }
.banner.portrait-export .caption { margin-top: 16px; padding-right: 220px; font-size: 26px; line-height: 1.3; }
.banner.portrait-export .pill { right: 44px; top: 50px; padding: 22px 28px; font-size: 25px; }
.banner.portrait-export .mark { font-size: 54px; }
.banner.portrait-export .m1 { left: 845px; top: 865px; }
.banner.portrait-export .m2 { left: 78px; top: 1715px; }
.banner.portrait-export .m3 { left: 860px; top: 1742px; }
  </style>
</head>
<body>
  <main id="banner" class="banner" aria-label="The Shib Bull live Ethereum banner">
    <div class="ring r1"></div>
    <div class="ring r2"></div>

    <div class="header">
      <div class="badge"><span class="dot"></span>LIVE ETHEREUM SNAPSHOT</div>
    </div>

    <h1 class="title">THE SHIB <span>BULL</span></h1>
    <p class="sub">SHIB holder momentum powered by the Ryoshi spirit.</p>

    <div class="logos">
      <div class="coin shib"><img src="https://raw.githubusercontent.com/Shibfun/RYOSHI/main/images/shib.png" alt="SHIB logo" crossorigin="anonymous"></div>
      <div class="coin ryoshi"><img src="https://raw.githubusercontent.com/Shibfun/RYOSHI/main/images/RYOSHI.png" alt="RYOSHI logo" crossorigin="anonymous"></div>
    </div>

    <section class="stats" aria-label="Live community statistics">
      <article class="stat">
        <div class="label">SHIB HOLDERS</div>
        <div class="value" id="shibHolders">1,675,084</div>
        <div class="caption" id="shibCaption">Live SHIB Community on Ethereum</div>
        <div class="pill">SHIB</div>
      </article>
      <article class="stat">
        <div class="label">RYOSHI ADDED</div>
        <div class="value" id="ryoshiAdded">+74,600</div>
        <div class="caption" id="ryoshiCaption">Ryoshi Community Growth</div>
        <div class="pill">RYOSHI</div>
      </article>
    </section>

    <div class="mark m1">◆</div>
    <div class="mark m2">◆</div>
    <div class="mark m3">◆</div>
  </main>

  <div class="downloadbar">
    <button id="downloadImageBtn" type="button">Download 1080×1080 PNG</button>
    <span id="downloadStatus">Button is outside the banner and will not appear in the image.</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>

(function () {
  'use strict';

  var SHIB_TOKEN = '0x95ad61b0a150d79219dcf64e1e6cc01f0b64c4ce';
  var BULL_CONTRACT = '0x23a0C2baB99fD2F864f5cd8b2659ec3b05D10E45';
  var TOTAL_AIRDROPPED_SELECTOR = '0x176ae550';
  var ETHPLORER_KEY = 'freekey';
  var REFRESH_MS = 60000;
  var REQUEST_TIMEOUT_MS = 9000;
  var CACHE_KEYS = {
    shib: 'theShibBull.shibHolders',
    ryoshi: 'theShibBull.ryoshiAdded'
  };
  var RPC_URLS = [
    'https://ethereum.publicnode.com',
    'https://ethereum-rpc.publicnode.com',
    'https://rpc.mevblocker.io',
    'https://eth-mainnet.public.blastapi.io',
    'https://eth.drpc.org'
  ];

  function byId(id) { return document.getElementById(id); }

  function formatNumber(value) {
    var number = Number(value);
    if (!Number.isFinite(number)) return String(value);
    return number.toLocaleString('en-US');
  }

  function setCache(key, value) {
    try {
      localStorage.setItem(key, JSON.stringify({ value: String(value), ts: Date.now() }));
    } catch (error) {}
  }

  function getCache(key) {
    try {
      var cached = JSON.parse(localStorage.getItem(key) || 'null');
      return cached && cached.value ? cached.value : null;
    } catch (error) {
      return null;
    }
  }

  function applyCachedStat(valueId, captionId, cacheKey, prefix) {
    var cached = getCache(cacheKey);
    if (!cached) return false;
    byId(valueId).textContent = (prefix || '') + formatNumber(cached);
    byId(captionId).textContent = 'Using cached data; live source temporarily unavailable';
    return true;
  }

  function fetchWithTimeout(url, options) {
    var controller = new AbortController();
    var timer = setTimeout(function () { controller.abort(); }, REQUEST_TIMEOUT_MS);
    var finalOptions = Object.assign({}, options || {}, { signal: controller.signal });
    return fetch(url, finalOptions).finally(function () { clearTimeout(timer); });
  }

  function fetchShibHolders() {
    var url = 'https://api.ethplorer.io/getTokenInfo/' + SHIB_TOKEN + '?apiKey=' + ETHPLORER_KEY;
    return fetchWithTimeout(url, { cache: 'no-store' })
      .then(function (response) {
        if (!response.ok) throw new Error('Ethplorer HTTP ' + response.status);
        return response.json();
      })
      .then(function (data) {
        if (!data || !data.holdersCount) throw new Error('holdersCount not found');
        return data.holdersCount;
      });
  }

  function ethCall(rpcUrl, to, data) {
    return fetchWithTimeout(rpcUrl, {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({
        jsonrpc: '2.0',
        id: Date.now(),
        method: 'eth_call',
        params: [{ to: to, data: data }, 'latest']
      })
    })
      .then(function (response) {
        if (!response.ok) throw new Error(rpcUrl + ' HTTP ' + response.status);
        return response.json();
      })
      .then(function (json) {
        if (json.error) throw new Error(json.error.message || 'RPC error');
        if (!json.result || json.result === '0x') throw new Error('empty RPC result');
        return Number.parseInt(json.result, 16);
      });
  }

  function fetchRyoshiAdded() {
    var chain = Promise.reject(new Error('No RPC attempted'));
    RPC_URLS.forEach(function (rpcUrl) {
      chain = chain.catch(function () {
        return ethCall(rpcUrl, BULL_CONTRACT, TOTAL_AIRDROPPED_SELECTOR);
      });
    });
    return chain;
  }

  function refreshLiveData() {
    var shibTask = fetchShibHolders()
      .then(function (value) {
        setCache(CACHE_KEYS.shib, value);
        byId('shibHolders').textContent = formatNumber(value);
        byId('shibCaption').textContent = 'Live SHIB Community on Ethereum';
      })
      .catch(function () {
        if (!applyCachedStat('shibHolders', 'shibCaption', CACHE_KEYS.shib, '')) {
          byId('shibCaption').textContent = 'Live source temporarily unavailable';
        }
      });

    var ryoshiTask = fetchRyoshiAdded()
      .then(function (value) {
        setCache(CACHE_KEYS.ryoshi, value);
        byId('ryoshiAdded').textContent = '+' + formatNumber(value);
        byId('ryoshiCaption').textContent = 'Ryoshi Community Growth';
      })
      .catch(function () {
        if (!applyCachedStat('ryoshiAdded', 'ryoshiCaption', CACHE_KEYS.ryoshi, '+')) {
          byId('ryoshiCaption').textContent = 'Live source temporarily unavailable';
        }
      });

    return Promise.allSettled([shibTask, ryoshiTask]);
  }

  function isMobileView() {
    return window.matchMedia('(max-width: 640px)').matches;
  }

  function updateDownloadUi() {
    var mobile = isMobileView();
    byId('downloadImageBtn').textContent = mobile ? 'Download 1080×1920 PNG' : 'Download 1080×1080 PNG';
    byId('downloadStatus').textContent = mobile
      ? 'Mobile download uses a vertical 9:16 portrait banner.'
      : 'Button is outside the banner and will not appear in the image.';
  }

  function makeExportNode(mobile) {
    var clone = byId('banner').cloneNode(true);
    clone.removeAttribute('id');
    clone.setAttribute('aria-hidden', 'true');
    if (mobile) clone.classList.add('portrait-export');
    clone.style.position = 'fixed';
    clone.style.left = '-12000px';
    clone.style.top = '0';
    clone.style.zIndex = '-1';
    clone.style.pointerEvents = 'none';
    if (!mobile) {
      clone.style.width = '800px';
      clone.style.height = '800px';
      clone.style.aspectRatio = 'auto';
    }
    document.body.appendChild(clone);
    return clone;
  }

  function waitForImages(root) {
    var images = Array.prototype.slice.call(root.querySelectorAll('img'));
    return Promise.all(images.map(function (img) {
      if (img.complete) return Promise.resolve();
      return new Promise(function (resolve) {
        img.onload = resolve;
        img.onerror = resolve;
      });
    }));
  }

  function downloadBannerPng() {
    var status = byId('downloadStatus');
    var button = byId('downloadImageBtn');
    var mobile = isMobileView();
    var exportWidth = mobile ? 1080 : 800;
    var exportHeight = mobile ? 1920 : 800;
    var outputWidth = 1080;
    var outputHeight = mobile ? 1920 : 1080;
    var scale = mobile ? 1 : 1.35;
    var exportNode = null;

    status.textContent = 'Preparing image...';
    button.disabled = true;

    Promise.resolve()
      .then(function () { return document.fonts && document.fonts.ready ? document.fonts.ready : null; })
      .then(refreshLiveData)
      .then(function () {
        if (!window.html2canvas) throw new Error('html2canvas failed to load');
        exportNode = makeExportNode(mobile);
        return waitForImages(exportNode);
      })
      .then(function () {
        return window.html2canvas(exportNode, {
          width: exportWidth,
          height: exportHeight,
          scale: scale,
          backgroundColor: null,
          useCORS: true,
          allowTaint: false,
          logging: false
        });
      })
      .then(function (canvas) {
        var link = document.createElement('a');
        var date = new Date().toISOString().slice(0, 10);
        link.download = 'the-shib-bull-' + (mobile ? 'mobile-' : '') + date + '.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        status.textContent = 'Downloaded ' + outputWidth + '×' + outputHeight + ' banner.';
      })
      .catch(function (error) {
        status.textContent = 'Download failed: ' + error.message;
      })
      .finally(function () {
        if (exportNode) exportNode.remove();
        button.disabled = false;
      });
  }

  updateDownloadUi();
  refreshLiveData();
  setInterval(refreshLiveData, REFRESH_MS);
  window.addEventListener('resize', updateDownloadUi);
  byId('downloadImageBtn').addEventListener('click', downloadBannerPng);
}());
  </script>
</body>
</html>
